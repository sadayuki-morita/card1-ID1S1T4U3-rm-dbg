            'onErrorCallbackKey': 'error',					// カード解析処理失敗に呼ばれるコールバックに指定するキー名

            'motionThresholdGridX' : 1.5,                       //motion制御X方向grid幅閾値
            'motionThresholdGridY' : 2,                         //motion制御Y方向grid幅閾値
            'motionThresholdAngle' : 20,                        //motion制御回転角度閾値(unit: degree)
            'cardIdNum' : ["T4-48"],                            //認証判定するID
            //'cardIdNum' : [],                                 //認証判定するID = CONFV8 の全ての場合、HTMLのコールバック関数内でID一致判定すること
            'accuracy' : 2 ,                                    //グリッド座標誤差許容範囲(unit: grid)
            'yGridMax' : 14,                                    //Y方向Grid座標最大値(unit: grid)             
            'xbasisGridDistance' : 10,                          //基準電極間X方向距離(unit: grid)            
            'ybasisGridDistance' : 10,                          //基準電極間Y方向距離(unit: grid)            
            'x1basisGridCoordinate' : 2,                        //基準電極1XGrid座標
            'y1basisGridCoordinate' : 12,                       //基準電極1XGrid座標
            'targetRad' : -0.7853981633974483                   //基準電極を結ぶ線分とX軸の角度(unit: radian)

            */

        // カード解析時に呼ばれる処理群
        var callbacks = {
            /* カード解析開始直前に呼ばれる処理 */
            'start': function() { // cardConf.willStartCollbackKey: function() {
                /* 必要に応じて処理を実装 */
                document.getElementById('name').style.backgroundColor = "#baffab";           //5point揃って解析中は、表題の背景色を変える

                console.log('start_analyze');
            },
        
            /* S1系カードでタッチした時に呼ばれる処理 */
            '1': function(cardId) {                                     //画面下に14mm程度移動検知した場合

                document.getElementById('name').style.backgroundColor = "#baffab";           //5point揃って解析中は、表題の背景色を変える

                let resultData = 'RN=1, '+ cardId + ", r= " + parseFloat(_cardAnalyzer.touchAngleDeg.toFixed(2)) + ", X= " + parseFloat(_cardAnalyzer.motionAnalogOut[0].toFixed(2)) + ", Y= "+ parseFloat(_cardAnalyzer.motionAnalogOut[1].toFixed(2)) + ", A= " + parseFloat(_cardAnalyzer.motionAnalogOut[2].toFixed(2))+ ", T= " + parseFloat(_cardAnalyzer.motionAnalogOut[3].toFixed(2));

                let index='',idNum='',positionNum='';

                    index = cardId.indexOf("-", cardId.indexOf("-") + 1);		//cardIdの先頭から２つ目の"-"の先頭文字からの位置を算出

                    idNum=cardId;

		        return true;
		        /* ↑↑↑画面遷移しない場合の実装 trueを返却↑↑↑ */

            },
        
            /* カード解析エラー発生時に呼ばれる処理 */

                /*
                 * errorCode 0: 正常, 1: 識別エラー, 3: 処理エラー

                /* 必要に応じて処理を実装 */
                document.getElementById('name').style.backgroundColor = "#baffab";           //5point揃って解析中は、表題の背景色を変える

                console.log('[' + analyzer.getErrorMessage(errorCode) + ']', errorMessage, errorId," , rX= - , rY= - , rA= -");

        /* 即時関数で環境確認 */
        var isPassive = false;	// パッシブ対応か否かを判定した結果を格納する
        (function() {
            try { 
                var options = Object.defineProperty({}, 'passive', { get: function() { isPassive = true; } });  
                window.addEventListener('test', options, options);  
                window.removeEventListener('test', options, options); 
            } catch (exception) { 
                isPassive = false; 
            }
        })();
        
        /* 各要素展開完了時にカードタッチ待受処理開始 */
        var readyFunc = function(e) {

            }
            console.log(e);             //20250423
        };
        
        /* 読込完了イベントを設定 */
        (function(){
	        window.addEventListener('DOMContentLoaded', readyFunc, isPassive ? {passive: false, capture: false} : false);
        })();
